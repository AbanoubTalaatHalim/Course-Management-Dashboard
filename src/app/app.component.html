<div class="app-layout">
  <aside class="sidebar" aria-label="Primary navigation">
    <a class="brand" routerLink="/courses" aria-label="Course dashboard home">
      <span class="brand-mark">CM</span>
      <span>
        <strong>Course Manager</strong>
        <small>Learning operations</small>
      </span>
    </a>

    <nav>
      <a routerLink="/courses" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span aria-hidden="true">#</span>
        Courses
      </a>
      <a routerLink="/courses/new" routerLinkActive="active">
        <span aria-hidden="true">+</span>
        New Course
      </a>
    </nav>

    <p class="sidebar-note">Built for quick course maintenance, search, review, and publishing decisions.</p>
  </aside>

  <div class="content-area">
    <header class="topbar">
      <div>
        <strong>Admin Dashboard</strong>
        <span>Course catalog workspace</span>
      </div>
      <a class="button primary" routerLink="/courses/new">Add Course</a>
    </header>

    <main>
      <router-outlet></router-outlet>
    </main>

    <footer>Course Management Dashboard &copy; {{ currentYear }}</footer>
  </div>
</div>

<app-toast-container></app-toast-container>
<app-confirmation-modal></app-confirmation-modal>
