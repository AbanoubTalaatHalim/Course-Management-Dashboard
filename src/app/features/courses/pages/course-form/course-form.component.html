<section class="page-shell">
  @if (notFound) {
    <div class="empty-state">
      <h1>Course not found</h1>
      <p>The course you tried to edit is no longer available.</p>
      <a class="button primary" routerLink="/courses">Return to Courses</a>
    </div>
  } @else {
    <div class="page-title">
      <div>
        <a class="back-link" routerLink="/courses">Back to courses</a>
        <h1>{{ title }}</h1>
        <p>Enter the course information required by the assignment brief, with validation shown below each field.</p>
      </div>
    </div>

    <form class="course-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <label class="field full">
          <span>Course name</span>
          <input class="control" type="text" formControlName="courseName" placeholder="Example: Angular Fundamentals">
          <small class="field-error" *ngIf="hasError('courseName', 'required')">Course name is required.</small>
          <small class="field-error" *ngIf="hasError('courseName', 'minlength')">Use at least 3 characters.</small>
        </label>

        <label class="field">
          <span>Instructor</span>
          <input class="control" type="text" formControlName="instructorName" placeholder="Instructor name">
          <small class="field-error" *ngIf="hasError('instructorName', 'required')">Instructor is required.</small>
        </label>

        <label class="field">
          <span>Category</span>
          <input class="control" type="text" formControlName="category" placeholder="Frontend, Design, DevOps">
          <small class="field-error" *ngIf="hasError('category', 'required')">Category is required.</small>
        </label>

        <label class="field">
          <span>Duration in hours</span>
          <input class="control" type="number" min="1" formControlName="duration">
          <small class="field-error" *ngIf="hasError('duration', 'required')">Duration is required.</small>
          <small class="field-error" *ngIf="hasError('duration', 'min')">Duration must be greater than 0.</small>
        </label>

        <label class="field">
          <span>Price</span>
          <input class="control" type="number" min="0" formControlName="price">
          <small class="field-error" *ngIf="hasError('price', 'required')">Price is required.</small>
          <small class="field-error" *ngIf="hasError('price', 'min')">Price cannot be negative.</small>
        </label>

        <label class="field">
          <span>Status</span>
          <select class="control" formControlName="status">
            @for (status of statuses; track status) {
              <option [ngValue]="status">{{ status }}</option>
            }
          </select>
          <small class="field-error" *ngIf="hasError('status', 'required')">Status is required.</small>
        </label>

        <label class="field full">
          <span>Description</span>
          <textarea class="control" formControlName="description" maxlength="500" placeholder="Optional course description"></textarea>
          <small class="helper-text">{{ form.controls.description.value.length }}/500 characters</small>
          <small class="field-error" *ngIf="hasError('description', 'maxlength')">Description must be 500 characters or less.</small>
        </label>
      </div>

      <div class="form-actions">
        <a class="button secondary" routerLink="/courses">Cancel</a>
        <button type="submit" class="button primary">{{ submitLabel }}</button>
      </div>
    </form>
  }
</section>
