<div class="modal-backdrop" *ngIf="request" (click)="respond(false)">
  <section class="modal-panel" role="dialog" aria-modal="true" [attr.aria-label]="request.title" (click)="$event.stopPropagation()">
    <h2>{{ request.title }}</h2>
    <p>{{ request.message }}</p>

    <div class="modal-actions">
      <button type="button" class="button secondary" (click)="respond(false)">
        {{ request.cancelText || 'Cancel' }}
      </button>
      <button type="button" class="button" [ngClass]="request.danger ? 'danger' : 'primary'" (click)="respond(true)">
        {{ request.confirmText || 'Confirm' }}
      </button>
    </div>
  </section>
</div>
