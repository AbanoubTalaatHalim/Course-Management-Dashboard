<div class="toast-stack" aria-live="polite" aria-atomic="true">
  @for (toast of toasts(); track toast.id) {
    <button
      type="button"
      class="toast"
      [ngClass]="toast.type"
      (click)="dismiss(toast.id)"
      [attr.aria-label]="'Dismiss notification: ' + toast.message"
    >
      <span>{{ toast.message }}</span>
    </button>
  }
</div>
